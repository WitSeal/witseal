name: 🐞 Bug report
description: Report a defect in WitSeal — runtime, CLI, schemas, or docs.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more concrete the
        reproducer, the faster we can fix it.

        For security vulnerabilities, **do NOT use this template** — see
        [SECURITY.md](https://github.com/WitSeal/witseal/blob/main/SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the actual behavior.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: |
        Smallest sequence of commands that reproduces the bug.
        If possible, paste the exact CLI invocation, intent, or policy pack.
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: WitSeal version
      placeholder: "0.1.0-pre or commit hash"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      description: Output of `node --version`
      placeholder: "v22.22.2"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Other / multiple
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Witness event entries, CLI output, or stderr from the failed action.
        Redact secrets before pasting.
      render: text

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have read [CONTRIBUTING.md](https://github.com/WitSeal/witseal/blob/main/CONTRIBUTING.md)
          required: true
        - label: I have searched existing issues and this is not a duplicate
          required: true
