version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    groups:
      dev-dependencies:
        dependency-type: "development"
    ignore:
      # The TypeScript/ESLint toolchain cluster is migrated deliberately as ONE
      # synchronized group, never piecemeal: a partial major (e.g. typescript or
      # eslint without a matching @typescript-eslint major) breaks build and lint.
      # Hold semver-MAJOR updates for the whole cluster. These conditions use
      # `update-types`, so Dependabot SECURITY updates for these packages are
      # still delivered — only routine version-update majors are held.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@typescript-eslint/*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
