name: Compat Corpus Parity Gate (§9)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compat-corpus:
    name: Cross-track parity gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout witseal
        uses: actions/checkout@v6

      - name: Mint compat-corpus read token (GitHub App)
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.COMPAT_READER_APP_ID }}
          private-key: ${{ secrets.COMPAT_READER_APP_PRIVATE_KEY }}
          owner: WitSeal
          repositories: compat-corpus

      - name: Checkout compat-corpus (private, via App token)
        uses: actions/checkout@v6
        with:
          repository: WitSeal/compat-corpus
          token: ${{ steps.app-token.outputs.token }}
          path: compat-corpus

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run compat-corpus parity check (chains 01-05)
        run: node --import tsx scripts/compat-corpus-check.mjs compat-corpus/chains/v0.1
